<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartPass</title>

    <script>
        (function() {
            const savedDarkMode = localStorage.getItem('darkMode') === 'true';
            const savedFontSize = localStorage.getItem('fontSize') || '16';
            if (savedDarkMode) document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.style.fontSize = savedFontSize + 'px';
        })();
    </script>

    <script src="database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #1a5c06;
            --green-dark: #0f3a03;
            --green-mid: #237a08;
            --green-light: #4caf50;
            --yellow: #f9d923;
            --ifpi-green: #1d4903;
            --card-bg: #ffffff;
            --bg: #f5f7f5;
            --text: #1e2d1c;
            --text-muted: #5a7055;
            --border: rgba(26,92,6,0.15);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --card-bg: #1a2818;
            --bg: #111a10;
            --text: #d4e8d0;
            --text-muted: #7aaa73;
            --border: rgba(76,175,80,0.15);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }

        body {
            font-family: 'Nunito', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            background: #0f3a03;
            transition: var(--transition);
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle-1 {
            position: absolute; width: 600px; height: 600px;
            border-radius: 50%; border: 70px solid rgba(255,255,255,0.03);
            top: -220px; right: -180px; pointer-events: none; z-index: 0;
        }
        .bg-circle-2 {
            position: absolute; width: 420px; height: 420px;
            border-radius: 50%; border: 50px solid rgba(249,217,35,0.05);
            bottom: -140px; left: -140px; pointer-events: none; z-index: 0;
        }
        .bg-glow {
            position: absolute; width: 700px; height: 500px;
            background: radial-gradient(ellipse, rgba(26,92,6,0.45) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 0;
        }

        .login-card {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
            overflow: hidden;
            animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: none; }
        }

        .card-top {
            background: var(--ifpi-green);
            padding: 2rem 2.5rem 1.8rem;
            position: relative;
            overflow: hidden;
        }

        .card-top::before {
            content: '';
            position: absolute;
            width: 240px; height: 240px;
            border-radius: 50%;
            border: 30px solid rgba(255,255,255,0.05);
            top: -80px; right: -70px;
            pointer-events: none;
        }

        .card-top::after {
            content: '';
            position: absolute;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(249,217,35,0.06);
            bottom: -40px; left: -30px;
            pointer-events: none;
        }

        .card-brand {
            display: flex; align-items: center; gap: 12px;
            position: relative; z-index: 1;
        }

        .card-brand-icon {
            width: 44px; height: 44px;
            background: var(--yellow);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: var(--green-dark);
            box-shadow: 0 4px 12px rgba(249,217,35,0.3);
            flex-shrink: 0;
        }

        .card-brand-name {
            font-family: 'Merriweather', serif;
            font-size: 1.3rem; color: white;
        }

        .theme-btn {
            position: absolute; top: 1.2rem; right: 1.4rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.65);
            width: 34px; height: 34px; border-radius: 9px;
            cursor: pointer; font-size: 0.88rem;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        .theme-btn:hover { background: rgba(255,255,255,0.18); color: white; }

        .card-top-divider {
            position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(249,217,35,0.25), transparent);
        }

        .card-body { padding: 2rem 2.5rem 2.5rem; }

        .login-greeting { margin-bottom: 1.6rem; }

        .login-greeting .hello {
            font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--green);
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 0.5rem;
        }
        [data-theme="dark"] .login-greeting .hello { color: var(--green-light); }
        .login-greeting .hello::before {
            content: ''; display: inline-block;
            width: 20px; height: 2px;
            background: currentColor; border-radius: 2px;
        }

        .login-greeting h2 {
            font-family: 'Merriweather', serif;
            font-size: 1.6rem; color: var(--text); line-height: 1.2;
        }

        .login-greeting p { margin-top: 0.4rem; font-size: 0.93rem; color: var(--text-muted); }

        .form-group { margin-bottom: 1.15rem; }

        .form-group label {
            display: block; font-weight: 700;
            font-size: 0.87rem; margin-bottom: 0.42rem; color: var(--text);
        }

        .input-wrap { position: relative; }

        .inp-icon {
            position: absolute; left: 13px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.87rem;
            pointer-events: none; transition: color 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 0.78rem 1rem 0.78rem 2.45rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.96rem;
            background: var(--bg); color: var(--text);
            transition: var(--transition);
        }

        /* impede estilo amarelo do autocomplete do Chrome */
        .form-group input:-webkit-autofill,
        .form-group input:-webkit-autofill:hover,
        .form-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px var(--bg) inset !important;
            -webkit-text-fill-color: var(--text) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(26,92,6,0.09);
            background: var(--card-bg);
        }

        .input-wrap:focus-within .inp-icon { color: var(--green); }

        [data-theme="dark"] .form-group input:focus {
            border-color: var(--green-light);
            box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
        }
        [data-theme="dark"] .input-wrap:focus-within .inp-icon { color: var(--green-light); }

        .toggle-pw {
            position: absolute; right: 11px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 0.87rem; padding: 3px 5px;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: var(--green); }

        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            margin-top: 0.6rem;
        }

        .btn-login {
            width: 100%; padding: 0.84rem;
            border: none; border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.97rem; font-weight: 700;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 9px;
            color: white;
        }

        .btn-main { background: var(--ifpi-green); }
        .btn-main:hover:not(:disabled) {
            background: var(--green-mid);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(26,92,6,0.28);
        }

        .btn-admin {
            background: transparent;
            border: 1.5px solid var(--border) !important;
            color: var(--text) !important;
            font-size: 0.91rem;
        }
        .btn-admin:hover:not(:disabled) {
            border-color: var(--green) !important;
            background: rgba(26,92,6,0.05);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(26,92,6,0.12);
        }
        [data-theme="dark"] .btn-admin { color: var(--text) !important; }
        [data-theme="dark"] .btn-admin:hover:not(:disabled) {
            border-color: var(--green-light) !important;
            background: rgba(76,175,80,0.07);
        }

        .btn-admin .admin-icon {
            width: 22px; height: 22px;
            background: var(--yellow);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: var(--green-dark);
            flex-shrink: 0;
        }

        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .divider-or {
            display: flex; align-items: center; gap: 0.8rem;
            margin: 0.2rem 0;
        }
        .divider-or::before, .divider-or::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .divider-or span {
            font-size: 0.78rem; color: var(--text-muted);
            font-weight: 700; letter-spacing: 0.06em;
            text-transform: uppercase; white-space: nowrap;
        }

        .alert {
            padding: 0.76rem 1rem; border-radius: 10px;
            margin-bottom: 0.9rem; font-size: 0.88rem;
            display: none; align-items: center; gap: 8px;
        }
        .alert.show { display: flex; animation: alertIn 0.3s ease; }

        @keyframes alertIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: none; }
        }

        .alert.error   { background: #fef0f0; color: #c0392b; border: 1px solid #fad7d7; }
        .alert.success { background: #f0fef4; color: #1e7e34; border: 1px solid #c3e6cb; }
        [data-theme="dark"] .alert.error   { background: #3a1a1a; color: #ff9999; border-color: #6a2a2a; }
        [data-theme="dark"] .alert.success { background: #1a3a1a; color: #99ee99; border-color: #2a6a2a; }

        /* modal */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
    background: var(--card-bg);
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    max-height: 90vh;        /* Garante que o modal não ultrapasse a altura da tela */
    overflow-y: auto;         /* Adiciona rolagem interna se necessário */
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    transform: translateY(16px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.25s ease;
    opacity: 0;
}

/* Ajuste para telas muito pequenas */
@media (max-width: 480px) {
    .modal-overlay {
        padding: 1rem;        /* Reduz o padding para dar mais espaço ao modal */
    }
    .modal {
        max-width: 95%;       /* Ocupa quase toda a largura da tela */
    }
}
        .modal-overlay.open .modal { transform: none; opacity: 1; }

        .modal-header {
            background: #1a1a1a;
            padding: 1.4rem 1.8rem 1.3rem;
            display: flex; align-items: center; gap: 11px;
            position: relative;
        }
        [data-theme="dark"] .modal-header { background: #0d0d0d; }

        .modal-header-icon {
            width: 38px; height: 38px;
            background: var(--yellow);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #1a1a1a; flex-shrink: 0;
        }

        .modal-header-text h3 { font-family: 'Merriweather', serif; font-size: 1rem; color: white; }
        .modal-header-text p  { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 1px; }

        .modal-close {
            position: absolute; top: 1rem; right: 1.2rem;
            background: rgba(255,255,255,0.1); border: none;
            color: rgba(255,255,255,0.6); width: 30px; height: 30px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .modal-close:hover { background: rgba(255,255,255,0.18); color: white; }

        .modal-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(249,217,35,0.3), transparent);
            margin-bottom: 1.5rem;
        }

        .modal-body { padding: 1.6rem 1.8rem 1.8rem; }

        .card-footer {
            padding-top: 1.3rem; margin-top: 0.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .card-footer a {
            color: var(--text-muted); text-decoration: none;
            font-size: 0.89rem; font-weight: 600;
            transition: var(--transition);
            display: inline-flex; align-items: center; gap: 6px;
        }
        .card-footer a:hover { color: var(--green); }
        [data-theme="dark"] .card-footer a:hover { color: var(--green-light); }

        .page-footer {
            position: absolute; bottom: 1.5rem;
            font-size: 0.75rem; color: rgba(255,255,255,0.22);
            letter-spacing: 0.05em; z-index: 1;
        }

        @media (max-width: 540px) {
            body { padding: 1.2rem; align-items: flex-start; padding-top: 2rem; overflow: auto; }
            .login-card { border-radius: 16px; }
            .card-top { padding: 1.8rem 1.8rem 1.6rem; }
            .card-body { padding: 1.6rem 1.8rem 2rem; }
            .page-footer { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-circle-1"></div>
    <div class="bg-circle-2"></div>

    <div class="login-card">

        <div class="card-top">
            <button class="theme-btn" onclick="toggleTheme()" title="Alternar tema">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <div class="card-brand">
                <div class="card-brand-icon"><i class="fas fa-id-card"></i></div>
                <div>
                    <span class="card-brand-name">SmartPass</span>
                </div>
            </div>
            <div class="card-top-divider"></div>
        </div>

        <div class="card-body">

            <div class="login-greeting">
                <div class="hello">Área de login</div>
                <h2>Bem-vindo de volta</h2>
                <p>Acesse o painel SmartPass.</p>
            </div>

            <div id="alert-main" class="alert"></div>

            <!-- autocomplete="off" no form + nome aleatório nos campos bloqueiam o preenchimento automático -->
            <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrap">
                        <input
                            type="email" id="email" name="x-email"
                            placeholder="seu@email.com"
                            autocomplete="off"
                            required>
                        <i class="fas fa-envelope inp-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrap">
                        <input
                            type="password" id="password" name="x-password"
                            placeholder="••••••••"
                            autocomplete="new-password"
                            required>
                        <i class="fas fa-lock inp-icon"></i>
                        <button type="button" class="toggle-pw" onclick="togglePw('password','eyeMain')">
                            <i class="fas fa-eye" id="eyeMain"></i>
                        </button>
                    </div>
                </div>

                <div class="buttons-group">
                    <button type="submit" class="btn-login btn-main" id="btnMain">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>

                    <div class="divider-or"><span>ou</span></div>

                    <button type="button" class="btn-login btn-admin" onclick="openAdminModal()">
                        <div class="admin-icon"><i class="fas fa-user-shield"></i></div>
                        Entrar como Administrador
                    </button>
                </div>
            </form>

            <div class="card-footer">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i> Voltar para o início
                </a>
            </div>

        </div>
    </div>

    <div class="page-footer">© 2025 SmartPass · IFPI</div>

    <!-- MODAL ADMINISTRADOR -->
    <div class="modal-overlay" id="adminModal" onclick="closeAdminModal(event)">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-header-icon"><i class="fas fa-user-shield"></i></div>
                <div class="modal-header-text">
                    <h3>Acesso de Administrador</h3>
                    <p>Credenciais com privilégios totais</p>
                </div>
                <button class="modal-close" onclick="closeAdminModal(null, true)">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-divider"></div>
            <div class="modal-body">

                <div id="alert-admin" class="alert"></div>

                <form id="adminForm" onsubmit="handleAdminLogin(event)" autocomplete="off">
                    <div class="form-group">
                        <label for="adminEmail">Email do administrador</label>
                        <div class="input-wrap">
                            <input
                                type="email" id="adminEmail" name="x-admin-email"
                                placeholder="seu@email.com"
                                autocomplete="off"
                                required>
                            <i class="fas fa-envelope inp-icon"></i>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom:1.5rem;">
                        <label for="adminPassword">Senha</label>
                        <div class="input-wrap">
                            <input
                                type="password" id="adminPassword" name="x-admin-password"
                                placeholder="••••••••"
                                autocomplete="new-password"
                                required>
                            <i class="fas fa-lock inp-icon"></i>
                            <button type="button" class="toggle-pw" onclick="togglePw('adminPassword','eyeAdmin')">
                                <i class="fas fa-eye" id="eyeAdmin"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login btn-main" id="btnAdmin" style="background:#1a1a1a;">
                        <i class="fas fa-user-shield"></i> Entrar como Administrador
                    </button>
                </form>

            </div>
        </div>
    </div>

    <script>
        /* ── TEMA ── */
        function applyTheme() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('themeIcon').className = 'fas fa-moon';
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('darkMode', 'false');
                document.getElementById('themeIcon').className = 'fas fa-moon';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('darkMode', 'true');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        }

   function openAdminModal() {
    document.getElementById('adminModal').classList.add('open');
    // Limpa os campos do modal toda vez que abre
    document.getElementById('adminEmail').value = '';
    document.getElementById('adminPassword').value = '';
    // Remove o setTimeout que focava automaticamente (evita teclado em celulares)
    // setTimeout(() => document.getElementById('adminEmail').focus(), 300);
}

        function closeAdminModal(e, force) {
            if (force || (e && e.target === document.getElementById('adminModal'))) {
                document.getElementById('adminModal').classList.remove('open');
                document.getElementById('adminForm').reset();
                document.getElementById('alert-admin').classList.remove('show');
                const btn = document.getElementById('btnAdmin');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-shield"></i> Entrar como Administrador';
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeAdminModal(null, true);
        });

        /* ── SENHA ── */
        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            input.type  = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }

        /* ── ALERTAS ── */
        function showAlert(alertId, message, type) {
            const el = document.getElementById(alertId);
            el.innerHTML = `<i class="fas fa-${type === 'error' ? 'times-circle' : 'check-circle'}"></i> ${message}`;
            el.className = `alert ${type} show`;
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        /* ── LOGIN NORMAL ── */
        function handleLogin(e) {
            e.preventDefault();
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btnMain');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';

            setTimeout(() => {
                if (email && password.length >= 4) {
                    const user = { name: 'Usuário', email, role: 'user', loginTime: new Date().toISOString() };
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    showAlert('alert-main', 'Login realizado com sucesso!', 'success');
                    btn.innerHTML = '<i class="fas fa-check"></i> Bem-vindo!';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showAlert('alert-main', 'Email ou senha incorretos!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                }
            }, 1000);
        }

        /* ── LOGIN ADMIN ── */
        function handleAdminLogin(e) {
            e.preventDefault();
            const email    = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const btn      = document.getElementById('btnAdmin');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';

            setTimeout(() => {
                if (email === 'admin@ifpi.edu.br' && password === 'admin123') {
                    const user = { name: 'Administrador', email, role: 'admin', loginTime: new Date().toISOString() };
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    showAlert('alert-admin', 'Acesso liberado!', 'success');
                    btn.innerHTML = '<i class="fas fa-check"></i> Bem-vindo, Admin!';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showAlert('alert-admin', 'Credenciais de administrador inválidas!', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-shield"></i> Entrar como Administrador';
                }
            }, 1000);
        }

        function isLoggedIn() { return localStorage.getItem('currentUser') !== null; }

        document.addEventListener('DOMContentLoaded', function () {
            applyTheme();
            const size = localStorage.getItem('fontSize') || '16';
            document.documentElement.style.fontSize = size + 'px';

            // Limpa todos os campos ao carregar — garante que o browser não preencha
            document.getElementById('loginForm').reset();
            document.getElementById('adminForm').reset();

            if (isLoggedIn()) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
