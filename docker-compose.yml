version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: smartpass-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  evolution:
    image: atendai/evolution-api:latest
    container_name: smartpass-evolution
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=SMARTPASS_SUPER_KEY_MUDA_ISSO
      - CACHE_REDIS_URL=redis://redis:6379
      - CACHE_REDIS_ENABLED=true
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data: